name: "Proje Ekle"
description: "Yeni bir proje veya medya baglantisi ekleyin (YouTube, endeks vb.)."
title: "Proje Ekle: <kisa baslik>"
labels:
  - "ekle-proje"
body:
  - type: markdown
    attributes:
      value: "Yeni bir proje eklemek icin tum alanlari doldurun. Bos biraktiklariniz gorunmez."
  - type: input
    id: title
    attributes:
      label: "Baslik"
      placeholder: "COVID-19 Economic Stimulus Index"
    validations:
      required: true
  - type: input
    id: label
    attributes:
      label: "Etiket"
      description: "Orn. 'YouTube . Turkce', 'Dataset / Index', 'EU Funded'."
      placeholder: "EU Funded"
  - type: input
    id: note
    attributes:
      label: "Not (aciklama) - opsiyonel"
      placeholder: "Project page"
  - type: input
    id: link
    attributes:
      label: "Baglanti - opsiyonel"
      placeholder: "https://web.bogazici.edu.tr/elgin/JeanMonnet.htm"
  - type: input
    id: link_label
    attributes:
      label: "Baglanti metni - opsiyonel"
      placeholder: "Project page →"
