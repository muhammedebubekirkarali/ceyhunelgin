name: "Yayin Sil"
description: "Bir yayini listeden kalirmak icin. Yayini duzeltmek icin 'Yayin Duzelt' formunu kullanin."
title: "Yayin Sil: <kisa baslik>"
labels:
  - "yayin-sil"
body:
  - type: markdown
    attributes:
      value: |
        KaldIrilacak yayini tespit etmek icin tam basligini yazin.
        Baslik duzgun yazilirsa arka plandaki islem otomatik bulur ve kaldirir.

  - type: input
    id: title
    attributes:
      label: "Kaldirilacak yayinin tam basligi"
      description: "Site uzerindeki gorunen baslik; kopyala-yapistir onerilir (en iyi eslesme)."
      placeholder: "Shadow Economies around the World: Evidence from Metropolitan Areas"
    validations:
      required: true
