name: "Ders Duzelt"
description: "Mevcut bir dersin bilgilerini goster + duzelt. Bot once mevcut degerleri gosterir."
title: "Ders Duzelt: <kisa baslik>"
labels:
  - "duzelt-ders"
body:
  - type: markdown
    attributes:
      value: |
        Bu form, var olan bir dersi gunceller.

        **Adim 1:** Asagidaki listeden duzeltmek istediginiz dersi secin ve "Submit" yapin.
        **Adim 2:** Bot, secili dersin mevcut tum bilgilerini (universite, ders adi, duzey) yorum olarak gosterir.
        **Adim 3:** O yoruma cevap olarak degistirmek istediginiz degerleri yazin.
  - type: dropdown
    id: old_course
    attributes:
      label: "Duzeltilecek ders"
      description: "Mevcut derslerden birini secin."
