name: "Icerik Duzelt"
description: "Kitap, proje, ders veya iletisim bilgisini guncelleyin. Yeni eklemek icin 'Icerik Ekle', silmek icin 'Icerik Sil' formunu kullanin."
title: "Duzelt: <tur> - <kisa baslik>"
labels:
  - "icerik-duzelt"
body:
  - type: markdown
    attributes:
      value: |
        Bu form, var olan bir keteg'i (kitap/proje/ders) yeni degerlerle gunceller;
        iletisim icin tum bolumu girdiklerinizle degistirir.
        Degistirmek istemediginiz alanlari bos birakin (mevcut degeri korur).

  - type: dropdown
    id: kind
    attributes:
      label: "Icerik turu"
      options:
        - "kitap"
        - "proje"
        - "ders"
        - "iletisim"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "--- Kitap / Proje: simdiki adi tespit icin (kitap ve proje icin doldurun) ---"

  - type: input
    id: old_title
    attributes:
      label: "Degisecek kitap/projenin simdiki tam adi"
      description: "Site uzerindeki mevcut baslik; kopyala-yapistir onerilir."
      placeholder: "The Informal Economy: Measures, Causes, and Consequences"

  - type: input
    id: title
    attributes:
      label: "Yeni baslik (kitap/proje) - opsiyonel"
      description: "Bos birakirsan simdiki baslik korunur."
      placeholder: "The Informal Economy: Measures, Causes, and Consequences (2nd Edition)"

  - type: input
    id: label
    attributes:
      label: "Yeni etiket (kitap/proje) - opsiyonel"

  - type: input
    id: note
    attributes:
      label: "Yeni not (kitap/proje) - opsiyonel"

  - type: input
    id: link
    attributes:
      label: "Yeni baglanti (kitap/proje) - opsiyonel"
      placeholder: "https://..."

  - type: input
    id: link_label
    attributes:
      label: "Yeni baglanti metni (kitap/proje) - opsiyonel"

  - type: markdown
    attributes:
      value: "--- Ders: simdiki adi tespit icin (ders icin doldurun) ---"

  - type: input
    id: university
    attributes:
      label: "Universite (ders)"
      description: "Dersin verildigi universite. Duzeltilecek dersi bulmak icin gerekli."
      placeholder: "Bogazici Universitesi"

  - type: input
    id: course_name
    attributes:
      label: "Degisecek dersin simdiki adi (ders)"
      placeholder: "Intermediate Macroeconomics"

  - type: input
    id: new_course_name
    attributes:
      label: "Yeni ders adi (ders) - opsiyonel"
      description: "Bos birakirsan simdiki ad korunur."

  - type: dropdown
    id: course_level
    attributes:
      label: "Yeni duzey (ders) - opsiyonel"
      options:
        - "(degisiklik yok)"
        - "B.A."
        - "M.A."
        - "Ph.D."

  - type: markdown
    attributes:
      value: "--- Iletisim: tum bolumu girdiklerinizle degistirir (iletisim icin doldurun; bos alanlar bos kalir) ---"

  - type: input
    id: email
    attributes:
      label: "E-posta(lar) - iletisim"
      description: "|  ile ayirip ikinci e-posta yazabilirsiniz."
      placeholder: "ceyhunelgin@gmail.com | ceyhun.elgin@boun.edu.tr"

  - type: input
    id: phone
    attributes:
      label: "Telefon - iletisim"
      placeholder: "+90 212 359 76 53"

  - type: input
    id: links_urls
    attributes:
      label: "Dis linkler (orijin: URL|Etiket) - iletisim"
      description: "Her satira bir (or ORNEK: https://orcid.org/0000..|ORCID: 0000..)."
      placeholder: "https://orcid.org/0000-0001-8796-2429|ORCID: 0000-0001-8796-2429"
