name: "Icerik Ekle"
description: "Kitap, proje, ders veya iletisim bilgisi ekleyin/guncelleyin. Yayin icin ayri 'Yeni Yayin Ekle' formunu kullanin."
title: "Ekle: <tur> - <kisa baslik>"
labels:
  - "icerik-ekle"
body:
  - type: markdown
    attributes:
      value: |
        Bu form, **yayin disi** bolumleri (kitap/proje/ders/iletisim) icindir.
        Yayin eklemek icin "Yeni Yayin Ekle" formunu kullanin.

  - type: dropdown
    id: kind
    attributes:
      label: "Icerik turu"
      description: "Hangi bolume ekliyorsunuz?"
      options:
        - "kitap"
        - "proje"
        - "ders"
        - "iletisim"
    validations:
      required: true

  - type: markdown
    attributes:
      value: "--- Kitap / Proje alanlari (kitap ve proje icin doldurun) ---"

  - type: input
    id: title
    attributes:
      label: "Baslik (kitap/proje)"
      description: "Kitap veya proje basligi."
      placeholder: "The Informal Economy: Measures, Causes, and Consequences"

  - type: input
    id: label
    attributes:
      label: "Etiket (kitap/proje) - opsiyonel"
      description: "Kartin alt kismindaki kucuk etiket. Ornek: 'English . Amazon', 'YouTube . Turkce', 'EU Funded'."
      placeholder: "Monograf . Routledge, 2021"

  - type: input
    id: note
    attributes:
      label: "Not (kitap/proje) - opsiyonel"
      description: "Basligin altindaki kisa aciklama."
      placeholder: "Editor - New York: Routledge"

  - type: input
    id: link
    attributes:
      label: "Baglanti (kitap/proje) - opsiyonel"
      description: "Dis link URL (https://...). Bos birakirsan karta link cikmaz."
      placeholder: "https://www.amazon.com/..."

  - type: input
    id: link_label
    attributes:
      label: "Baglanti metni (kitap/proje) - opsiyonel"
      description: "Linkin gorunen metni. Bos birakirsan URL gosterilir."
      placeholder: "View on Amazon ->"

  - type: markdown
    attributes:
      value: "--- Ders alanlari (ders icin doldurun) ---"

  - type: input
    id: university
    attributes:
      label: "Universite (ders)"
      description: "Dersin verildigi universite. Yeni universite ise yeni kart olusur; mevcutsa o universiteye eklenir."
      placeholder: "Bogazici Universitesi"

  - type: input
    id: course_name
    attributes:
      label: "Ders adi (ders)"
      placeholder: "Intermediate Macroeconomics"

  - type: dropdown
    id: course_level
    attributes:
      label: "Duzey (ders)"
      options:
        - "B.A."
        - "M.A."
        - "Ph.D."
      description: "Lisans / Yuksek lisans / Doktora."

  - type: markdown
    attributes:
      value: "--- Iletisim alanlari (iletisim icin doldurun; tum iletisim her gonderiste degistirilir) ---"

  - type: input
    id: email
    attributes:
      label: "E-posta(lar)"
      description: "|  orjin ile ayirip ikinci e-posta yazabilirsiniz. Bos birakirsaniz iletisim guncellenmez."
      placeholder: "ceyhunelgin@gmail.com | ceyhun.elgin@boun.edu.tr"

  - type: input
    id: phone
    attributes:
      label: "Telefon"
      description: "+90 biçiminde."
      placeholder: "+90 212 359 76 53"

  - type: input
    id: links_urls
    attributes:
      label: "Dis linkler (orijin: URL|Etiket)"
      description: "Her satira bir (or ORNEK: https://orcid.org/0000..|ORCID: 0000..)."
      placeholder: "https://orcid.org/0000-0001-8796-2429|ORCID: 0000-0001-8796-2429"

  - type: markdown
    attributes:
      value: |
        ---
        **Not:** Iletisim turu secildiinda, form tum iletisim bolumunu girdiginizle degistirir (ek degil).
        Bos alanlar iltisim kartinda bos kalir ama guncelleme yine yapilir.
        Bos alanlari doldurunuz.
