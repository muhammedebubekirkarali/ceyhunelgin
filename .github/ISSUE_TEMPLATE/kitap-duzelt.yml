name: "Kitap Duzelt"
description: "Mevcut bir kitabin bilgilerini goster + duzelt. Bot once mevcut degerleri gosterir."
title: "Kitap Duzelt: <kisa baslik>"
labels:
  - "duzelt-kitap"
body:
  - type: markdown
    attributes:
      value: |
        Bu form, var olan bir kitabi gunceller.

        **Adim 1:** Asagidaki listeden duzeltmek istediginiz kitabi secin ve "Submit" yapin.
        **Adim 2:** Bot, secili kitabin mevcut tum bilgilerini (baslik, etiket, not, baglanti) yorum olarak gosterir.
        **Adim 3:** O yoruma cevap olarak degistirmek istediginiz degerleri yazin.
  - type: dropdown
    id: old_title
    attributes:
      label: "Duzeltilecek kitap"
      description: "Mevcut kitaplardan birini secin."
      options:
        - "The Art and Science of Tax Evasion"
        - "Bu Hesapta Bir Gariplik Var"
        - "Sen de Ekonomistsin"
        - "Routledge Handbook of the Informal Economy"
        - "The Informal Economy: Measures, Causes, and Consequences"
    validations:
      required: true
