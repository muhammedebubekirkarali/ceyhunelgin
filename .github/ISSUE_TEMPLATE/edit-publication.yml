name: "Yayin Duzelt"
description: "Mevcut bir yayinin bilgilerini goster + duzelt. Bot once mevcut degerleri yorum olarak gosterir."
title: "Yayin Duzelt: <kisa baslik>"
labels:
  - "duzelt-yayin"
body:
  - type: markdown
    attributes:
      value: |
        Bu form, var olan bir yayini gunceller.

        **Adim 1:** Asagidaki listeden duzeltmek istediginiz yayini secin ve "Submit" yapin.
        **Adim 2:** Bot, secili yayinin mevcut tum bilgilerini (yil, baslik, yazarlar, dergi, DOI) yorum olarak gosterir.
        **Adim 3:** O yoruma cevap olarak degistirmek istediginiz degerleri yazin (yalnizca guncellemek istediklerinizi).

