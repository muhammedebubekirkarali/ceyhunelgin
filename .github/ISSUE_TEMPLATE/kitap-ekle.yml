name: "Kitap Ekle"
description: "Yeni bir kitap ekleyin."
title: "Kitap Ekle: <kisa baslik>"
labels:
  - "ekle-kitap"
body:
  - type: markdown
    attributes:
      value: "Yeni bir kitap eklemek icin tum alanlari doldurun. Bos biraktiklariniz gorunmez."
  - type: input
    id: title
    attributes:
      label: "Baslik"
      placeholder: "The Informal Economy: Measures, Causes, and Consequences"
    validations:
      required: true
  - type: input
    id: label
    attributes:
      label: "Etiket (kartin alt kismindaki kucuk etiket)"
      description: "Orn. 'English . Amazon', 'Monografi . Routledge, 2021'."
      placeholder: "Monograph · Routledge, 2021"
  - type: input
    id: note
    attributes:
      label: "Not (basligin altindaki aciklama) - opsiyonel"
      placeholder: "Editor — New York: Routledge"
  - type: input
    id: link
    attributes:
      label: "Baglanti (Amazon vb.) - opsiyonel"
      placeholder: "https://www.amazon.com/dp/..."
  - type: input
    id: link_label
    attributes:
      label: "Baglanti metni - opsiyonel"
      placeholder: "View on Amazon →"
