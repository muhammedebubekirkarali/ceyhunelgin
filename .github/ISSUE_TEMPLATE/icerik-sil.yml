name: "Icerik Sil / Duzelt"
description: "Kitap, proje, ders veya iletisim bolumunden bir ogeyi kaldirin. Yayin icin ayri 'Yayin Sil / Duzelt' formunu kullanin."
title: "Sil: <tur> - <kisa baslik>"
labels:
  - "icerik-sil"
body:
  - type: markdown
    attributes:
      value: |
        Kaldirilacak ogeyi tespit etmek icin tur ve tam adini yazin.

  - type: dropdown
    id: kind
    attributes:
      label: "Icerik turu"
      options:
        - "kitap"
        - "proje"
        - "ders"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "Kaldirilacak ogenin tam adi"
      description: "Kitap/proje: baslik. Ders: ders adini yazin (universite baglamita tespit edilir)."
      placeholder: "The Informal Economy: Measures, Causes, and Consequences"
    validations:
      required: true

  - type: input
    id: university
    attributes:
      label: "Universite (yalnizca ders silerken)"
      description: "Ders silme ise universite adini yazin. Kitap/proje icin bos birakin."
      placeholder: "Bogazici Universitesi"
