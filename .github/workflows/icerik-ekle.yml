name: Icerik Ekle

on:
  issues:
    types: [opened]

jobs:
  add:
    if: contains(github.event.issue.labels.*.name, 'icerik-ekle')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Kaynak kodu cikar
        uses: actions/checkout@v4

      - name: Icerigi ilgili JSON'a ekle
        id: add
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json, os, re, sys
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]

          def field(label):
              marker = "### " + label
              i = body.find(marker)
              if i < 0:
                  return ""
              rest = body[i + len(marker):]
              started = False
              val_lines = []
              for ln in rest.split("\n")[1:]:
                  if ln.startswith("### "):
                      break
                  if not started:
                      if ln.strip() == "":
                          continue
                      started = True
                      val_lines.append(ln)
                  else:
                      val_lines.append(ln)
              while val_lines and val_lines[-1].strip() == "":
                  val_lines.pop()
              val = "\n".join(val_lines).strip()
              if val in ("", "_No response_"):
                  return ""
              return val

          def env(key, val):
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"{key}={val}\n")

          kind = field("Icerik turu").strip().lower()
          kind = {"kitap":"kitap","proje":"proje","ders":"ders","i̇leti̇şi̇m":"iletisim","iletisim":"iletisim"}.get(kind, kind)

          errs = []
          def maybe(s):
              s = s.strip()
              return s or None

          if kind in ("kitap", "proje"):
              fn = "books.json" if kind == "kitap" else "projects.json"
              title = field("Baslik (kitap/proje)")
              label = maybe(field("Etiket (kitap/proje) - opsiyonel"))
              note = maybe(field("Not (kitap/proje) - opsiyonel"))
              link = maybe(field("Baglanti (kitap/proje) - opsiyonel"))
              link_label = maybe(field("Baglanti metni (kitap/proje) - opsiyonel"))
              if not title:
                  errs.append("Baslik bos.")
              desc = title
              if errs:
                  env("RESULT", "error"); env("MESSAGE", "; ".join(errs)); sys.exit(0)
              item = {
                  "label": label, "title": title, "note": note,
                  "link": link, "link_label": link_label,
              }
              data = json.loads(Path(fn).read_text(encoding="utf-8"))
              data.append(item)
              Path(fn).write_text(json.dumps(data, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              env("RESULT", "ok"); env("FILE", fn); env("DESC", desc); env("COUNT", str(len(data)))

          elif kind == "ders":
              uni = field("Universite (ders)")
              cname = field("Ders adi (ders)")
              level = field("Duzey (ders)").strip()
              if not uni: errs.append("Universite bos.")
              if not cname: errs.append("Ders adi bos.")
              desc = cname
              if errs:
                  env("RESULT", "error"); env("MESSAGE", "; ".join(errs)); sys.exit(0)
              data = json.loads(Path("teaching.json").read_text(encoding="utf-8"))
              found = None
              for u in data:
                  if u["university"] == uni:
                      found = u; break
              if not found:
                  found = {"university": uni, "courses": []}
                  data.append(found)
              found["courses"].append({"name": cname, "level": level or "B.A."})
              Path("teaching.json").write_text(json.dumps(data, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              env("RESULT", "ok"); env("FILE", "teaching.json"); env("DESC", desc); env("COUNT", str(sum(len(u["courses"]) for u in data)))

          elif kind == "iletisim":
              email = maybe(field("E-posta(lar)"))
              phone = maybe(field("Telefon"))
              links_block = maybe(field("Dis linkler (orijin: URL|Etiket)"))
              # parse email ve links
              mails = [m.strip() for m in (email or "").split("|") if m.strip()] if email else []
              links = []
              if links_block:
                  for line in links_block.splitlines():
                      line = line.strip()
                      if not line: continue
                      parts = line.split("|", 1)
                      url = parts[0].strip()
                      label = parts[1].strip() if len(parts) > 1 else url
                      if url:
                          links.append({"url": url, "label": label})
              data = {
                  "mails": mails,
                  "phone": phone,
                  "phone_display": None,
                  "links": links,
              }
              Path("contact.json").write_text(json.dumps(data, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              env("RESULT", "ok"); env("FILE", "contact.json"); env("DESC", "iletisim guncellendi"); env("COUNT", "1")

          else:
              env("RESULT", "error"); env("MESSAGE", f"Tur bilinmiyor: {kind}"); sys.exit(0)

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.json projects.json teaching.json contact.json
          git commit -m "Icerik eklendi (#${{ github.event.issue.number }}): ${{ env.DESC }}"
          git push

      - name: Basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Icerik eklendi.\n\n- ${process.env.DESC}\n- Dosya: ${process.env.FILE}\n- Toplam: ${process.env.COUNT}\n\nBir dakika icinde site guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Hata yorumu + kapat
        if: env.RESULT == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Form eksik veya hatali:\n\n${process.env.MESSAGE}\n\nDuzeltip yeniden gonderin.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["hatali-form"]
            });
