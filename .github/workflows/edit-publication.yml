name: Yayin Duzelt

on:
  issues:
    types: [opened]

jobs:
  edit:
    if: contains(github.event.issue.labels.*.name, 'yayin-duzelt')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Kaynak kodu cikar
        uses: actions/checkout@v4

      - name: Yayin duzelt
        id: edit
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json, os, re, sys
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]
          body = body.replace("\\(", "(").replace("\\)", ")")

          def field(label):
              marker = "### " + label
              i = body.find(marker)
              if i < 0:
                  return ""
              started = False
              val_lines = []
              for ln in body[i + len(marker):].split("\n")[1:]:
                  if ln.startswith("### "):
                      break
                  if not started:
                      if ln.strip() == "":
                          continue
                      started = True
                      val_lines.append(ln)
                  else:
                      val_lines.append(ln)
              while val_lines and val_lines[-1].strip() == "":
                  val_lines.pop()
              val = "\n".join(val_lines).strip()
              if val in ("", "_No response_"):
                  return ""
              return val

          def env(key, val):
              val = str(val).replace("\n", " ")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"{key}={val}\n")

          def maybe(s):
              return s.strip() or None

          raw_old = field("Degisecek yayin").strip()
          # dropdown degeri '[YYYY] Baslik' formatinda; on eki soy
          old_title = re.sub(r"^\[\d{4}\]\s*", "", raw_old).strip()
          if not old_title:
              env("RESULT", "error"); env("MESSAGE", "Degisecek baslik bos."); sys.exit(0)

          new_year_s = field("Yeni Yil (opsiyonel)").strip()
          new_title = field("Yeni Baslik (opsiyonel)").strip()
          new_authors = field("Yeni Yazarlar (opsiyonel)").strip()
          new_venue = field("Yeni Dergi / yayin bilgisi (opsiyonel)").strip()
          new_doi = field("Yeni DOI / Kaynak Baglantisi (opsiyonel)").strip()

          if not any([new_year_s, new_title, new_authors, new_venue, new_doi]):
              env("RESULT", "error"); env("MESSAGE", "Hicbir yeni deger verilmedi; en az bir alan doldurun."); sys.exit(0)

          new_year = None
          if new_year_s:
              try:
                  new_year = int(new_year_s)
                  if new_year < 1900 or new_year > 2100:
                      env("RESULT", "error"); env("MESSAGE", f"Yil cok buyuk: {new_year}"); sys.exit(0)
              except Exception:
                  env("RESULT", "error"); env("MESSAGE", "Yil sayi degil."); sys.exit(0)

          pj = Path("publications.json")
          data = json.loads(pj.read_text(encoding="utf-8"))

          _cevir = str.maketrans({
              "ğ":"g","Ğ":"g","ı":"i","İ":"i","ö":"o","Ö":"o","ü":"u","Ü":"u",
              "ş":"s","Ş":"s","ç":"c","Ç":"c","â":"a","î":"i","û":"u"
          })
          def norm(s):
              return re.sub(r"\s+", " ", s.strip().translate(_cevir)).lower()

          # 1) birebir normalize eslesme
          nt = norm(old_title)
          matches = [p for p in data if norm(p["title"]) == nt]
          if not matches:
              # 2) tek iceren (cok eslesirse nomatch)
              matches = [p for p in data if nt in norm(p["title"]) or norm(p["title"]) in nt]
              if len(matches) > 1:
                  env("RESULT", "nomatch")
                  env("DESC", old_title)
                  env("MESSAGE", "COK:" + str(len(matches)))
                  sys.exit(0)

          if not matches:
              env("RESULT", "nomatch"); env("DESC", old_title); sys.exit(0)

          old = matches[0]
          # yeni degerleri sadece verilenler uygula; bos -> mevcut korunur
          updated = dict(old)
          if new_year is not None:
              updated["year"] = new_year
          if new_title:
              updated["title"] = new_title
          if new_authors:
              updated["authors"] = new_authors or None
          elif new_authors == "" and "authors" in old:
              pass  # bos -> mevcut korunur (formda '_No response_' zaten bos)
          if new_venue:
              updated["venue"] = new_venue or None
          if new_doi or new_doi == "":
              # doi '""' verildiyse (kullanici bilerek bos birakmis -> None)
              updated["doi"] = new_doi or None

          # eskiyi yeni ile degistir (ayni pozisyonda)
          idx = data.index(old)
          data[idx] = updated
          # yila gore buyukten kucuge
          data.sort(key=lambda p: p["year"], reverse=True)
          pj.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          old_title_clean = old["title"].replace("\n", " ")
          new_title_clean = updated["title"].replace("\n", " ")
          Path("commit_msg.txt").write_text(
              f"Yayin duzeltildi (#{os.environ['ISSUE_NUMBER']}): {old_title_clean} -> {new_title_clean}\n",
              encoding="utf-8",
          )
          env("RESULT", "ok")
          env("OLD", old_title_clean)
          env("NEW", new_title_clean)
          env("COUNT", str(len(data)))
          print("Duzeltildi:", old["title"], "->", updated["title"])

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -F commit_msg.txt
          git push
          rm -f commit_msg.txt

      - name: Basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Yayin guncellendi.\n\n- Eski: ${process.env.OLD}\n- Yeni: ${process.env.NEW}\n- Toplam: ${process.env.COUNT}\n\nBir dakika icinde site guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Eslesmedi yorumu + kapat
        if: env.RESULT == 'nomatch'
        uses: actions/github-script@v7
        with:
          script: |
            const m = process.env.MESSAGE || "";
            let body = `Degisecek yayin bulunamadi:\n\n${process.env.DESC}\n\nTam basligi yazin (siteden kopyala-yapistir).`;
            if (m.startsWith("COK:")) {
              const n = m.slice(4);
              body = `${n} aday baslik bulundu:\n\n${process.env.DESC}\n\nHangisini degistireceginizi tam baslikla belirtin.`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["eslesmedi"]
            });

      - name: Hata yorumu + kapat
        if: env.RESULT == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Form hatali:\n\n${process.env.MESSAGE}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["hatali-form"]
            });
