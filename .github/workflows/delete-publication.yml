name: Yayin Sil

on:
  issues:
    types: [opened]

jobs:
  delete:
    if: contains(github.event.issue.labels.*.name, 'yayin-sil')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Kaynak kodu cikar
        uses: actions/checkout@v4

      - name: Yayin sil (baslik eslesmesiyle)
        id: del
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json, os, re, sys
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]
          # GitHub Issue Forms parantezli label'lari '\(' '\)' olarak escape eder;
          # normalize ederek arama yapariz.
          body = body.replace("\\(", "(").replace("\\)", ")")

          def field(label):
              marker = "### " + label
              i = body.find(marker)
              if i < 0:
                  return ""
              rest = body[i + len(marker):]
              started = False
              val_lines = []
              for ln in rest.split("\n")[1:]:
                  if ln.startswith("### "):
                      break
                  if not started:
                      if ln.strip() == "":
                          continue
                      started = True
                      val_lines.append(ln)
                  else:
                      val_lines.append(ln)
              while val_lines and val_lines[-1].strip() == "":
                  val_lines.pop()
              val = "\n".join(val_lines).strip()
              if val in ("", "_No response_"):
                  return ""
              return val

          title = field("Kaldirilacak yayinin tam basligi").strip()
          if not title:
              with open(os.environ["GITHUB_ENV"], "a") as _e:
                  _e.write("RESULT=error\nMESSAGE=Baslik bos.\n")
              sys.exit(0)

          pj = Path("publications.json")
          data = json.loads(pj.read_text(encoding="utf-8"))

          # 1) birebir normalize eslesme (case + bosluk duyarsiz)
          norm = lambda s: re.sub(r"\s+", " ", s).strip().lower()
          nt = norm(title)
          matches = [p for p in data if norm(p["title"]) == nt]
          if not matches:
              # 2) tek eslesme iceren (cok eslesirse guvenlik icin nomatch)
              matches = [p for p in data if nt in norm(p["title"]) or norm(p["title"]) in nt]
              if len(matches) > 1:
                  with open(os.environ["GITHUB_ENV"], "a") as _e:
                      _e.write("RESULT=nomatch\n")
                      _e.write("TITLE=" + title.replace("\n", " ") + "\n")
                      _e.write("MESSAGE=" + str(len(matches)) + " aday baslik bulundu; tam baslik yazin.\n")
                  sys.exit(0)

          if not matches:
              with open(os.environ["GITHUB_ENV"], "a") as _e:
                  _e.write("RESULT=nomatch\n")
                  _e.write("TITLE=" + title.replace("\n", " ") + "\n")
              sys.exit(0)

          match = matches[0]
          data2 = [p for p in data if p is not match]
          pj.write_text(
              json.dumps(data2, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          title_clean = match["title"].replace("\n", " ")
          Path("commit_msg.txt").write_text(
              f"Yayin silindi (#{os.environ['ISSUE_NUMBER']}): {title_clean}\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_ENV"], "a") as _e:
              _e.write("RESULT=ok\n")
              _e.write("TITLE=" + title_clean + "\n")
              _e.write(f"YEAR={match.get('year','')}\n")
              _e.write(f"COUNT={len(data2)}\n")
          print("Silindi:", match["title"])

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -F commit_msg.txt
          git push
          rm -f commit_msg.txt

      - name: Basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Yayin listeden kaldirildi.\n\n- Baslik: ${process.env.TITLE}\n- Kalan yayin: ${process.env.COUNT}\n\nSite bir dakika icinde guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Eslesmedi yorumu + kapat
        if: env.RESULT == 'nomatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Bu baslikla eslesen bir yayin bulunamadi:\n\n${process.env.TITLE}\n\nBasligin tam yazildigindan emin olun (site uzerinden kopyala-yapistir oe ras). Tekrar denerken yeni bir issue acin.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["eslesmedi"]
            });

      - name: Hata yorumu + kapat
        if: env.RESULT == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Form hatali:\n\n${process.env.MESSAGE}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["hatali-form"]
            });
