name: Yayin Ekle

on:
  issues:
    types: [opened]

jobs:
  add:
    if: contains(github.event.issue.labels.*.name, 'yeni-yayin')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Kaynak kodu cikar
        uses: actions/checkout@v4

      - name: Yayin ekle (JSON guncelle)
        id: add
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json, os, re, sys
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]
          # GitHub Issue Forms parantezli label'lari '\(' '\)' olarak escape eder;
          # normalize ederek arama yapariz.
          body = body.replace("\\(", "(").replace("\\)", ")")

          # Form cevaplarini ayikla: GitHub "### Label\n\nvalue\n" seklinde yazar
          def field(label):
              # '### <label>' satirindan sonraki ilk bos olmayan satir
              marker = "### " + label
              i = body.find(marker)
              if i < 0:
                  return ""
              rest = body[i + len(marker):]
              started = False
              val_lines = []
              for ln in rest.split("\n")[1:]:
                  if ln.startswith("### "):
                      break
                  if not started:
                      if ln.strip() == "":
                          continue
                      started = True
                      val_lines.append(ln)
                  else:
                      val_lines.append(ln)
              while val_lines and val_lines[-1].strip() == "":
                  val_lines.pop()
              val = "\n".join(val_lines).strip()
              if val in ("", "_No response_"):
                  return ""
              return val

          year_s = field("Yil")
          title = field("Baslik")
          authors = field("Yazarlar (opsiyonel)")
          venue = field("Dergi / yayin bilgisi (opsiyonel)")
          doi = field("DOI / Kaynak Baglantisi (opsiyonel)")

          # hatalari topla
          errs = []
          try:
              year = int(year_s.strip())
              if year < 1900 or year > 2100:
                  errs.append(f"Yil cok buyuk: {year}")
          except Exception:
              errs.append("Yil sayi degil veya bos.")

          title = title.strip()
          if not title:
              errs.append("Baslik bos.")

          if errs:
              print("VALIDATION_ERRORS")
              print("\n".join(errs))
              # hata bayragini dosyaya yaz ki sonraki step okusun (APPEND, tek satir)
              with open(os.environ["GITHUB_ENV"], "a") as _e:
                  _e.write("RESULT=error\n")
                  _e.write("MESSAGE=" + "; ".join(errs).replace("\n", " ") + "\n")
              sys.exit(0)

          # publication nesnesi
          pub = {
              "year": year,
              "title": title,
              "authors": authors.strip() or None,
              "venue": venue.strip() or None,
              "doi": doi.strip() or None,
          }

          pj = Path("publications.json")
          data = json.loads(pj.read_text(encoding="utf-8"))
          data.append(pub)
          # yila gore buyukten kucuge; yil esitse en son eklenen en sona -> stable sort
          data.sort(key=lambda p: p["year"], reverse=True)
          pj.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          # Title'i tek-satirlik dosyaya yaz; commit -F ile guvenli beslenir (K4)
          title_clean = title.replace("\n", " ")
          Path("commit_msg.txt").write_text(
              f"Yayin eklendi (#{os.environ['ISSUE_NUMBER']}): {title_clean}\n",
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_ENV"], "a") as _e:
              _e.write("RESULT=ok\n")
              _e.write(f"YEAR={year}\n")
              _e.write("TITLE=" + title_clean + "\n")
              _e.write(f"COUNT={len(data)}\n")
          print("OK added:", title)

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -F commit_msg.txt
          git push
          rm -f commit_msg.txt

      - name: Issue'ya basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Yayin siteniz eklendi.\n\n- Baslik: ${process.env.TITLE}\n- Toplam yayin: ${process.env.COUNT}\n\nBir dakika icinde GitHub Pages guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

      - name: Issue'ya hata yorumu + kapat
        if: env.RESULT == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Yayin eklenemedi. Form eksik veya hatali:\n\n${process.env.MESSAGE}\n\nDuzeltip yeniden gonderin.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              labels: ["hatali-form"]
            });
