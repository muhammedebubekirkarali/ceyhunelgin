name: Icerik Sil

on:
  issues:
    types: [opened]

jobs:
  delete:
    if: contains(github.event.issue.labels.*.name, 'sil-kitap') || contains(github.event.issue.labels.*.name, 'sil-proje') || contains(github.event.issue.labels.*.name, 'sil-ders')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Sil
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          import json, os, re, sys
          from pathlib import Path
          body = os.environ["ISSUE_BODY"].replace("\\(", "(").replace("\\)", ")")
          labels = os.environ["ISSUE_LABELS"].split(",")
          gh = Path(os.environ["GITHUB_ENV"])
          def env(k, v):
              v = str(v).replace("\n", " ").replace("\r", " ")
              with gh.open("a") as f: f.write(f"{k}={v}\n")
          _cevir = str.maketrans({"ğ":"g","Ğ":"g","ı":"i","İ":"i","ö":"o","Ö":"o","ü":"u","Ü":"u","ş":"s","Ş":"s","ç":"c","Ç":"c"})
          def norm(s): return re.sub(r"\s+", " ", s.strip().translate(_cevir)).lower()
          def fv(label):
              marker = "### " + label
              i = body.find(marker)
              if i < 0: return ""
              started = False; vlines = []
              for ln in body[i+len(marker):].split("\n")[1:]:
                  if ln.startswith("### "): break
                  if not started:
                      if ln.strip() == "": continue
                      started = True; vlines.append(ln)
                  else:
                      vlines.append(ln)
              while vlines and vlines[-1].strip() == "": vlines.pop()
              v = "\n".join(vlines).strip()
              return "" if v in ("", "_No response_") else v
          def pick(items, key, title):
              nt = norm(title)
              m = next((it for it in items if norm(it[key]) == nt), None)
              if m: return m
              cands = [it for it in items if nt in norm(it[key]) or norm(it[key]) in nt]
              if len(cands) == 1: return cands[0]
              return None

          if "sil-kitap" in labels or "sil-proje" in labels:
              is_book = "sil-kitap" in labels
              fn = "books.json" if is_book else "projects.json"
              kind = "Kitap" if is_book else "Proje"
              v = fv("Kaldirilacak " + kind).strip()
              data = json.loads(Path(fn).read_text(encoding="utf-8"))
              m = pick(data, "title", v)
              if not m: env("RESULT", "nomatch"); env("DESC", v); sys.exit(0)
              data2 = [it for it in data if it is not m]
              Path(fn).write_text(json.dumps(data2, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              desc = m["title"].replace("\n", " ")
              env("RESULT", "ok"); env("DESC", f"{kind}: {desc}"); env("FILE", fn); env("COUNT", str(len(data2)))

          elif "sil-ders" in labels:
              v = fv("Kaldirilacak ders").strip()
              parts = re.split(r"\s+—\s+", v, maxsplit=1)
              uni = parts[0].strip()
              rest = parts[1] if len(parts) > 1 else ""
              course = re.sub(r"\s*\([^)]+\)\s*$", "", rest).strip()
              data = json.loads(Path("teaching.json").read_text(encoding="utf-8"))
              found_u = next((u for u in data if norm(u["university"]) == norm(uni)), None)
              if not found_u: env("RESULT", "nomatch"); env("DESC", v); sys.exit(0)
              m = next((c for c in found_u["courses"] if norm(c["name"]) == norm(course)), None)
              if not m: env("RESULT", "nomatch"); env("DESC", v); sys.exit(0)
              found_u["courses"] = [c for c in found_u["courses"] if c is not m]
              if not found_u["courses"]:
                  data = [u for u in data if u is not found_u]
              Path("teaching.json").write_text(json.dumps(data, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              env("RESULT", "ok"); env("DESC", f"{uni} - {course}"); env("FILE", "teaching.json"); env("COUNT", str(sum(len(u["courses"]) for u in data)))
          else:
              sys.exit(0)

          Path("commit_msg.txt").write_text(
              f"Icerik silindi (#{os.environ['ISSUE_NUMBER']}): {os.environ.get('DESC','')}\n",
              encoding="utf-8",
          )

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.json projects.json teaching.json contact.json
          git commit -F commit_msg.txt
          git push
          rm -f commit_msg.txt

      - name: Basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Kaldirildi.\n\n- ${process.env.DESC}\n- Dosya: ${process.env.FILE}\n- Kalan: ${process.env.COUNT}\n\nSite bir dakika icinde guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Eslesmedi + kapat
        if: env.RESULT == 'nomatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Oge bulunamadi:\n\n${process.env.DESC}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed", labels: ["eslesmedi"]
            });
