name: Icerik Sil

on:
  issues:
    types: [opened]

jobs:
  delete:
    if: contains(github.event.issue.labels.*.name, 'icerik-sil')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Kaynak kodu cikar
        uses: actions/checkout@v4

      - name: Icerigi ilgili JSON'dan sil
        id: del
        shell: python
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          import json, os, re, sys
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]
          # GitHub Issue Forms parantezli label'lari '\(' '\)' olarak escape eder;
          # normalize ederek arama yapariz.
          body = body.replace("\\(", "(").replace("\\)", ")")

          def field(label):
              marker = "### " + label
              i = body.find(marker)
              if i < 0:
                  return ""
              rest = body[i + len(marker):]
              started = False
              val_lines = []
              for ln in rest.split("\n")[1:]:
                  if ln.startswith("### "):
                      break
                  if not started:
                      if ln.strip() == "":
                          continue
                      started = True
                      val_lines.append(ln)
                  else:
                      val_lines.append(ln)
              while val_lines and val_lines[-1].strip() == "":
                  val_lines.pop()
              val = "\n".join(val_lines).strip()
              if val in ("", "_No response_"):
                  return ""
              return val

          def env(key, val):
              val = str(val).replace("\n", " ")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"{key}={val}\n")

          kind = field("Icerik turu").strip().lower()
          kind = {"kitap":"kitap","proje":"proje","ders":"ders"}.get(kind, kind)
          title = field("Kaldirilacak ogenin tam adi").strip()
          uni = field("Universite (yalnizca ders silerken)").strip()

          _cevir = str.maketrans({
              "ğ":"g","Ğ":"g","ı":"i","İ":"i","ö":"o","Ö":"o","ü":"u","Ü":"u",
              "ş":"s","Ş":"s","ç":"c","Ç":"c","â":"a","î":"i","û":"u"
          })
          def norm(s):
              return re.sub(r"\s+", " ", s.strip().translate(_cevir)).lower()

          if not title:
              env("RESULT", "error"); env("MESSAGE", "Adi bos."); sys.exit(0)

          def pick_match(items, key):
              nt = norm(title)
              # 1) birebir normalize
              matches = [it for it in items if norm(it[key]) == nt]
              if not matches:
                  # 2) tek iceren (cok eslesirse nomatch)
                  matches = [it for it in items if nt in norm(it[key]) or norm(it[key]) in nt]
                  if len(matches) > 1:
                      return None, f"{len(matches)} aday bulundu; tam adi yazin."
              return (matches[0] if matches else None), None

          if kind in ("kitap", "proje"):
              fn = "books.json" if kind == "kitap" else "projects.json"
              data = json.loads(Path(fn).read_text(encoding="utf-8"))
              match, msg = pick_match(data, "title")
              if match is None and msg:
                  env("RESULT", "nomatch"); env("DESC", title); env("MESSAGE", msg); sys.exit(0)
              if match is None:
                  env("RESULT", "nomatch"); env("DESC", title); sys.exit(0)
              data2 = [it for it in data if it is not match]
              Path(fn).write_text(json.dumps(data2, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              desc_clean = match["title"].replace("\n", " ")
              Path("commit_msg.txt").write_text(
                  f"Icerik silindi (#{os.environ['ISSUE_NUMBER']}): {desc_clean}\n",
                  encoding="utf-8",
              )
              env("RESULT", "ok"); env("FILE", fn); env("DESC", desc_clean); env("COUNT", str(len(data2)))

          elif kind == "ders":
              if not uni:
                  env("RESULT", "error"); env("MESSAGE", "Ders silerken universite adini yazin."); sys.exit(0)
              data = json.loads(Path("teaching.json").read_text(encoding="utf-8"))
              found_u = None
              for u in data:
                  if norm(u["university"]) == norm(uni):
                      found_u = u; break
              if not found_u:
                  env("RESULT", "nomatch"); env("DESC", f"{uni} / {title}"); sys.exit(0)
              match, msg = pick_match(found_u["courses"], "name")
              if match is None and msg:
                  env("RESULT", "nomatch"); env("DESC", f"{uni} / {title}"); env("MESSAGE", msg); sys.exit(0)
              if match is None:
                  env("RESULT", "nomatch"); env("DESC", f"{uni} / {title}"); sys.exit(0)
              found_u["courses"] = [c for c in found_u["courses"] if c is not match]
              # universitede ders kalmadiysa universiteyi de kaldir
              if not found_u["courses"]:
                  data = [u for u in data if u is not found_u]
              Path("teaching.json").write_text(json.dumps(data, ensure_ascii=False, indent=2)+"\n", encoding="utf-8")
              desc_clean = f"{uni} - {match['name']}".replace("\n", " ")
              Path("commit_msg.txt").write_text(
                  f"Icerik silindi (#{os.environ['ISSUE_NUMBER']}): {desc_clean}\n",
                  encoding="utf-8",
              )
              env("RESULT", "ok"); env("FILE", "teaching.json"); env("DESC", desc_clean); env("COUNT", str(sum(len(u["courses"]) for u in data)))

          else:
              env("RESULT", "error"); env("MESSAGE", f"Tur bilinmiyor: {kind}"); sys.exit(0)

      - name: Commit + push
        if: env.RESULT == 'ok'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books.json projects.json teaching.json contact.json
          git commit -F commit_msg.txt
          git push
          rm -f commit_msg.txt

      - name: Basari yorumu + kapat
        if: env.RESULT == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Icerik kaldirildi.\n\n- ${process.env.DESC}\n- Dosya: ${process.env.FILE}\n- Kalan: ${process.env.COUNT}\n\nSite bir dakika icinde guncellenir.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Eslesmedi yorumu + kapat
        if: env.RESULT == 'nomatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Eslesen oge bulunamadi:\n\n${process.env.DESC}\n\nAdin/tam basligin dogrulgundan emin olun. Yeni bir issue acin.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["eslesmedi"]
            });

      - name: Hata yorumu + kapat
        if: env.RESULT == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Form hatali:\n\n${process.env.MESSAGE}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed",
              labels: ["hatali-form"]
            });
